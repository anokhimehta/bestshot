# K8S manifest for Anokhi's training container
# Dockerfile: https://github.com/anokhimehta/bestshot/blob/main/training/docker/Dockerfile
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bestshot-training
  namespace: bestshot-platform
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: training
            image: ghcr.io/anokhimehta/bestshot-training:latest
            command: ["python", "training/train.py", "--config", "training/config/partial_finetune_highlr.yaml"]
            envFrom:
            - secretRef:
                name: openstack-credentials
            - secretRef:
                name: mlflow-credentials
          restartPolicy: Never