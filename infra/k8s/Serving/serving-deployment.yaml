# K8S manifest for Lava's serving container
# Dockerfile: https://github.com/anokhimehta/bestshot/blob/main/serving/docker/Dockerfile.serve
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bestshot-serving
  namespace: bestshot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bestshot-serving
  template:
    metadata:
      labels:
        app: bestshot-serving
    spec:
      containers:
      - name: serving
        image: bestshot-serving:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: bestshot-serving
  namespace: bestshot-app
spec:
  selector:
    app: bestshot-serving
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30800
