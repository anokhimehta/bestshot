apiVersion: apps/v1
kind: Deployment
metadata:
  name: bestshot-serving-production
  namespace: bestshot-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bestshot-serving
      env: production
  template:
    metadata:
      labels:
        app: bestshot-serving
        env: production
    spec:
      containers:
      - name: serving
        image: ghcr.io/anokhimehta/bestshot-serving:latest
        env:
        - name: MODEL_STAGE
          value: "Production"
        - name: ENVIRONMENT
          value: "production"
        - name: BUCKET_NAME
          value: "ak12754-data-proj19"
        - name: OS_REGION_NAME
          value: "CHI@TACC"
        - name: OS_AUTH_TYPE
          value: "v3applicationcredential"
        - name: MLFLOW_MODEL_ALIAS
          value: "production"
        - name: DEVICE
          value: "cpu"
        envFrom:
        - secretRef:
            name: mlflow-credentials
        - secretRef:
            name: openstack-credentials
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          # Allow slow model/bootstrap startup before liveness kicks in.
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bestshot-serving-production
  namespace: bestshot-production
spec:
  selector:
    app: bestshot-serving
    env: production
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30803