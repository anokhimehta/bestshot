apiVersion: apps/v1
kind: Deployment
metadata:
  name: bestshot-serving-canary
  namespace: bestshot-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bestshot-serving
      env: canary
  template:
    metadata:
      labels:
        app: bestshot-serving
        env: canary
    spec:
      containers:
      - name: serving
        image: ghcr.io/anokhimehta/bestshot-serving:latest
        env:
        - name: MODEL_STAGE
          value: "Canary"
        - name: ENVIRONMENT
          value: "canary"
        - name: BUCKET_NAME
          value: "ak12754-data-proj19"
        - name: OS_REGION_NAME
          value: "CHI@TACC"
        - name: OS_AUTH_TYPE
          value: "v3applicationcredential"
        - name: DEVICE
          value: "cpu"
        envFrom:
        - secretRef:
            name: mlflow-credentials
        - secretRef:
            name: openstack-credentials
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bestshot-serving-canary
  namespace: bestshot-canary
spec:
  selector:
    app: bestshot-serving
    env: canary
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30802