# K8S manifest for Anurag's batch pipeline container
# Dockerfile: https://github.com/anokhimehta/bestshot/blob/main/data/batch_pipeline/Dockerfile
apiVersion: batch/v1
kind: Job
metadata:
  name: bestshot-batch-pipeline
  namespace: bestshot-platform
spec:
  template:
    spec:
      containers:
      - name: batch-pipeline
        image: bestshot-batch-pipeline:latest
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      restartPolicy: Never
