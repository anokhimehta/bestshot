# K8S manifest for Anurag's data generator container
# Dockerfile: https://github.com/anokhimehta/bestshot/blob/main/data/generator/Dockerfile
apiVersion: batch/v1
kind: Job
metadata:
  name: bestshot-generator
  namespace: bestshot-platform
spec:
  template:
    spec:
      containers:
      - name: generator
        image: bestshot-generator:latest
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      restartPolicy: Never
