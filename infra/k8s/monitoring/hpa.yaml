# Horizontal Pod Autoscaler for production serving
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bestshot-serving-hpa
  namespace: bestshot-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bestshot-serving-production
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
---
# HPA for canary serving
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bestshot-serving-canary-hpa
  namespace: bestshot-canary
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bestshot-serving-canary
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70