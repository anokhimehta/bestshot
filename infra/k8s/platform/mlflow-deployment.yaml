apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: bestshot-platform
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.10.0
        command:
          - /bin/sh
          - -c
          - >
            mlflow server
            --backend-store-uri postgresql://user:password@postgres/mlflowdb
            --artifacts-destination s3://proj19-mlflow-artifacts/
            --serve-artifacts
            --host 0.0.0.0
            --port 5000
        env:
        - name: MLFLOW_S3_ENDPOINT_URL
          value: https://chi.tacc.chameleoncloud.org:7480
        envFrom:
        - secretRef:
            name: mlflow-artifact-credentials
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"