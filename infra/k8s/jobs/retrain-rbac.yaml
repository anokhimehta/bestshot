apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: retrain-job-launcher
  namespace: bestshot-platform
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: retrain-job-launcher-binding
  namespace: bestshot-platform
subjects:
  - kind: ServiceAccount
    name: default
    namespace: bestshot-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: retrain-job-launcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bestshot-deployment-restart
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bestshot-deployment-restart-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: bestshot-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bestshot-deployment-restart
