apiVersion: batch/v1
kind: CronJob
metadata:
  name: bestshot-retrain
  namespace: bestshot-platform
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          hostAliases:
          - ip: "129.114.97.101"
            hostnames:
            - chi.tacc.chameleoncloud.org
          containers:
          - name: retrain
            image: ghcr.io/anokhimehta/bestshot-training:latest
            command: ["python", "training/retrain.py"]
            envFrom:
            - secretRef:
                name: openstack-credentials
            - secretRef:
                name: mlflow-credentials
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "1000m"
                memory: "2Gi"
          restartPolicy: OnFailure