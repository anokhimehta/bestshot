apiVersion: batch/v1
kind: CronJob
metadata:
  name: bestshot-rollback-check
  namespace: bestshot-platform
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: rollback
            image: python:3.12-slim
            command:
            - python
            - -c
            - |
              import urllib.request, os, subprocess, sys

              # Check production health
              prod_url = "http://bestshot-serving-production.bestshot-production.svc.cluster.local:8000/health"
              try:
                  req = urllib.request.urlopen(prod_url, timeout=10)
                  data = req.read().decode()
                  print(f"Production healthy: {data}")
                  sys.exit(0)
              except Exception as e:
                  print(f"Production UNHEALTHY: {e}")
                  print("Triggering rollback...")
                  # Create rollback job
                  import subprocess
                  result = subprocess.run([
                      "kubectl", "create", "job",
                      "rollback-auto", "--from=cronjob/bestshot-retrain",
                      "-n", "bestshot-platform"
                  ], capture_output=True, text=True)
                  print(result.stdout)
                  print(result.stderr)
          restartPolicy: OnFailure