apiVersion: batch/v1
kind: CronJob
metadata:
  name: bestshot-rollback-check
  namespace: bestshot-platform
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: rollback
            image: ghcr.io/anokhimehta/bestshot-training:latest
            envFrom:
            - secretRef:
                name: mlflow-credentials
            command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              PROD_URL="http://bestshot-serving-production.bestshot-production.svc.cluster.local:8000/health"
              if curl -fsS --max-time 10 "${PROD_URL}" >/dev/null; then
                echo "Production health check passed"
                exit 0
              fi

              echo "Production health check failed, rolling back model"
              python /scripts/promote.py rollback

              kubectl rollout restart deployment/bestshot-serving-canary -n bestshot-canary
              kubectl rollout restart deployment/bestshot-serving-production -n bestshot-production
            volumeMounts:
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: scripts
            configMap:
              name: promote-script
          restartPolicy: OnFailure